spring.application.name=Odiro

# Server Configuration
server.port=8080

# External API Configuration
api.kakao.key=YOUR_KAKAO_REST_API_KEY
api.naver.id=YOUR_NAVER_CLIENT_ID
api.naver.secret=YOUR_NAVER_CLIENT_SECRET

# Database Configuration (H2)
spring.datasource.url=jdbc:h2:mem:placedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# Feign Client Logging (Debugging)
logging.level.com.example.placemashup.infrastructure.api=DEBUG

# OpenFeign Timeout Settings (Optional)
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000